# Два независимых кластера в одной Docker-сети.
# Reindex с remote выполняется на DESTINATION; whitelist задаётся только там (разрешённые хосты источника).

services:
  source-node-1:
    image: opensearchproject/opensearch:2.17.0
    container_name: source-node-1
    environment:
      - cluster.name=source-cluster
      - node.name=source-node-1
      - discovery.seed_hosts=source-node-2
      - cluster.initial_cluster_manager_nodes=source-node-1,source-node-2
      - bootstrap.memory_lock=false
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - network.host=0.0.0.0
      - http.port=9200
      - transport.port=9300
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ports:
      - "9201:9200"
    volumes:
      - source-node-1-data:/usr/share/opensearch/data
    networks:
      - opensearch-net

  source-node-2:
    image: opensearchproject/opensearch:2.17.0
    container_name: source-node-2
    environment:
      - cluster.name=source-cluster
      - node.name=source-node-2
      - discovery.seed_hosts=source-node-1
      - cluster.initial_cluster_manager_nodes=source-node-1,source-node-2
      - bootstrap.memory_lock=false
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - network.host=0.0.0.0
      - http.port=9200
      - transport.port=9300
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    volumes:
      - source-node-2-data:/usr/share/opensearch/data
    networks:
      - opensearch-net
    depends_on:
      - source-node-1

  destination-node-1:
    image: opensearchproject/opensearch:2.17.0
    container_name: destination-node-1
    environment:
      - cluster.name=destination-cluster
      - node.name=destination-node-1
      - discovery.seed_hosts=destination-node-2
      - cluster.initial_cluster_manager_nodes=destination-node-1,destination-node-2
      - bootstrap.memory_lock=false
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - network.host=0.0.0.0
      - http.port=9200
      - transport.port=9300
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - reindex.remote.whitelist=source-node-1:9200,source-node-2:9200
    ports:
      - "9202:9200"
    volumes:
      - destination-node-1-data:/usr/share/opensearch/data
    networks:
      - opensearch-net

  destination-node-2:
    image: opensearchproject/opensearch:2.17.0
    container_name: destination-node-2
    environment:
      - cluster.name=destination-cluster
      - node.name=destination-node-2
      - discovery.seed_hosts=destination-node-1
      - cluster.initial_cluster_manager_nodes=destination-node-1,destination-node-2
      - bootstrap.memory_lock=false
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - network.host=0.0.0.0
      - http.port=9200
      - transport.port=9300
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - reindex.remote.whitelist=source-node-1:9200,source-node-2:9200
    volumes:
      - destination-node-2-data:/usr/share/opensearch/data
    networks:
      - opensearch-net
    depends_on:
      - destination-node-1

  dashboards-source:
    image: opensearchproject/opensearch-dashboards:2.17.0
    container_name: dashboards-source
    ports:
      - "5602:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://source-node-1:9200","http://source-node-2:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    networks:
      - opensearch-net
    depends_on:
      - source-node-2

  dashboards-dest:
    image: opensearchproject/opensearch-dashboards:2.17.0
    container_name: dashboards-dest
    ports:
      - "5603:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://destination-node-1:9200","http://destination-node-2:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    networks:
      - opensearch-net
    depends_on:
      - destination-node-2

volumes:
  source-node-1-data:
  source-node-2-data:
  destination-node-1-data:
  destination-node-2-data:

networks:
  opensearch-net:
    driver: bridge
